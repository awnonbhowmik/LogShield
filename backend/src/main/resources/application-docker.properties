# Activated automatically when SPRING_PROFILES_ACTIVE=docker
# (docker-compose sets env vars which override these directly)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/logshield}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080
